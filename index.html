<!DOCTYPE html>
<html lang="pt"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avisos Meteo Funchal</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#fff;font-family:Arial,sans-serif}
body{display:inline-block;padding:0}

/* ── Map widget ── */
.map-widget{
  width:200px;background:#fff;border:1px solid #ccc;border-radius:0;
  overflow:hidden;display:flex;flex-direction:column;cursor:pointer;text-decoration:none;
  border-top:none;
}
.map-widget:hover{filter:brightness(0.96)}
.map-title{
  font-size:12px;font-weight:700;color:#000;text-align:center;
  padding:3px 2px 2px;border-bottom:1px solid #e0e0e0;line-height:1.3;flex-shrink:0;
}
.map-area{display:flex;align-items:center;justify-content:center;padding:4px 3px 2px;}
.map-area svg{width:190px;height:auto;}

/* ── Header widget ── */
.header-widget{
  width:200px;height:auto;
  background:#fff;
  border:none solid #ccc;
  border-top:none;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  padding:4px;
  gap:3px;
  cursor:pointer;
  text-decoration:none;
}
.header-widget:hover{background:#f5f5f5}
.header-widget img {
  display: none;
}
.header-widget .header-title{
  font-size:12px;
  font-weight:700;
  color:#000;
  text-align:center;
  line-height:1.25;
  word-break:break-word;
  hyphens:auto;
}

/* ── Region widgets ── */
.region-widget{
  width:200px;height:auto;
  background:#fff;
  border:1px solid #ccc;
  border-top:none;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  cursor:pointer;
  text-decoration:none;
}
.region-widget:hover{background:#f5f5f5}
.region-name{
  font-size:10px;font-weight:700;color:#222;
  text-align:center;
  padding:2px 2px 1px;
  border-bottom:1px solid #e0e0e0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.2;
  flex-shrink:0;
}
.icon-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(2,22px);
  flex:1;
}
.icon-cell{
  display:flex;align-items:center;justify-content:center;
  border-right:1px solid rgba(0,0,0,.07);
  border-bottom:1px solid rgba(0,0,0,.07);
}
.icon-cell:nth-child(4n){border-right:none}
.icon-cell:nth-child(n+5){border-bottom:none}
.bg-green{background:#4caf50;color:#fff}
.bg-yellow{background:#fdd835;color:#222}
.bg-orange{background:#ff8c00;color:#fff}
.bg-red{background:#e53935;color:#fff}
.bg-none{background:#e0e0e0;color:#999}

/* ── Footer ── */
.fonte{
  width:200px;
  font-size:5.5px;color:#666;text-align:right;
  padding:1px 4px 3px;
  border:1px solid #ccc;border-top:none;border-bottom:none;
  background:#fff;
}

/* ── Avisos em vigor ── */
.active-warnings{
  width:200px;
  background:#fff;
  border:1px solid #ccc;
  border-top:none;
  border-radius:0 0 4px 4px;
  padding:4px 5px 5px;
  display:flex;
  flex-direction:column;
  gap:3px;
}
.active-warnings-title{
  font-size:10px;
  font-weight:700;
  color:#333;
  border-bottom:1px solid #eee;
  padding-bottom:2px;
  margin-bottom:1px;
}
.active-warn-row{
  display:flex;
  align-items:center;
  gap:4px;
}
.active-warn-icon{
  width:16px;height:16px;
  border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.active-warn-icon svg{
  width:11px;height:11px;
  fill:#000;
}
.active-warn-text{
  font-size:6px;
  color:#333;
  line-height:1.3;
}
.active-warn-region{
  font-weight:700;
  font-size:6px;
}
.no-active-warn{
  font-size:9px;
  color:#888;
  font-style:italic;
}
</style>
</head>

const PHENOMENA=['Trovoada','Precipitação','Vento','Agitação Marítima','Neve','Tempo Frio','Tempo Quente','Nevoeiro'];
const TYPE_MAP={'Rain':'Precipitação','Wind':'Vento','Fog':'Nevoeiro','Snow/Ice':'Neve','Thunderstorm':'Trovoada','Coastal Event':'Agitação Marítima','High Temperature':'Tempo Quente','Low Temperature':'Tempo Frio'};
const REGIONS={MRM:'Regiões Montanhosas',MCS:'Costa Sul'};
const LVL_W={red:4,orange:3,yellow:2,green:1};
const BG={green:'bg-green',yellow:'bg-yellow',orange:'bg-orange',red:'bg-red'};

/* ──────────────── MAP constants ──────────────── */
const COLORS_M={red:'#e53935',orange:'#ff8c00',yellow:'#fdd835',green:'#4caf50',none:'#4caf50'};
const LVL_M={red:4,orange:3,yellow:2,green:1,none:0};
const COASTAL='Agitação Marítima';

/* ──────────────── Shared helpers ──────────────── */
function normType(t){return TYPE_MAP[t]||t}
function normLevel(l){return(l||'green').toLowerCase()}
function normLevelM(l){return(l||'none').toLowerCase()}

function maxLevelForPhenomenon(phenomenon,warnings){
  let max='green';
  warnings.forEach(w=>{
    if(normType(w.awarenessTypeName)!==phenomenon)return;
    const lv=normLevel(w.awarenessLevelID);
    if((LVL_W[lv]||0)>(LVL_W[max]||0))max=lv;
  });
  return max;
}

function maxLevelMap(code,coastalOnly,data){
  let max='none';
  data.forEach(w=>{
    if(w.idAreaAviso!==code)return;
    const isCoastal=w.awarenessTypeName===COASTAL;
    if(coastalOnly&&!isCoastal)return;
    if(!coastalOnly&&isCoastal)return;
    const lv=normLevelM(w.awarenessLevelID);
    if((LVL_M[lv]||0)>(LVL_M[max]||0))max=lv;
  });
  return max;
}

function paintMap(id,color){
  const el=document.getElementById(id);
  if(el)el.setAttribute('fill',color);
}

/* ──────────────── Build: header + region widgets ──────────────── */
function buildHeaderWidget(){
  return`<a class="header-widget" href="https://iamnunocaldeira.github.io/ipma-avisos-madeira/" target="_blank" rel="noopener">
    <img src="data:image/png;base64,${LOGO_B64}" alt="Logo Proteção Civil Funchal"/>
    <div class="header-title">Avisos meteorológicos para o Funchal nas próximas 72 horas</div>
  </a>`;
}

function buildRegionWidget(code, name, warnings){
  const cellsHtml=PHENOMENA.map(p=>{
    const lv=maxLevelForPhenomenon(p,warnings);
    const bgCls=BG[lv]||'bg-none';
    return`<div class="icon-cell ${bgCls}" title="${p}"><span class="icon-svg" style="display:flex;width:18px;height:18px;color:#000">${ICONS[p]||''}</span></div>`;
  }).join('');
  return`<a class="region-widget" href="https://iamnunocaldeira.github.io/ipma-avisos-madeira/" target="_blank" rel="noopener">
    <div class="region-name" title="${name}">${name}</div>
    <div class="icon-grid">${cellsHtml}</div>
  </a>`;
}


/* ──────────────── Avisos em vigor agora ──────────────── */
function pad2(n){return String(n).padStart(2,'0')}

function formatDT(iso){
  const d=new Date(iso);
  return pad2(d.getDate())+'/'+pad2(d.getMonth()+1)+' '+pad2(d.getHours())+'H'+pad2(d.getMinutes());
}

function buildActiveWarnings(data){
  const now = new Date();
  // Only care about MCS (Costa Sul), MRM (Regiões Montanhosas)
  // and Agitação Marítima for MCS
  const INTEREST = [
    {code:'MCS', label:'Costa Sul',          coastal:false},
    {code:'MRM', label:'R. Montanhosas',     coastal:false},
    {code:'MCS', label:'Agit. Mar. Sul',     coastal:true},
  ];
  const LVL_ORDER={red:4,orange:3,yellow:2,green:1};
  const BG={red:'#e53935',orange:'#ff8c00',yellow:'#fdd835',green:'#4caf50'};
  const COASTAL_TYPE='Agitação Marítima';

  // Find active warnings right now for each interest
  let rows = [];
  INTEREST.forEach(({code,label,coastal})=>{
    // Find all active warnings at this moment
    const active = data.filter(w=>{
      if(w.idAreaAviso!==code) return false;
      const isCoastal=(w.awarenessTypeName===COASTAL_TYPE);
      if(coastal && !isCoastal) return false;
      if(!coastal && isCoastal) return false;
      const s=new Date(w.startTime), e=new Date(w.endTime);
      return now>=s && now<e;
    });

    if(!active.length) return; // nothing active now

    // Group by phenomenon type, find max level per type
    const byType={};
    active.forEach(w=>{
      const t=w.awarenessTypeName;
      const lv=(w.awarenessLevelID||'green').toLowerCase();
      if(!byType[t]||((LVL_ORDER[lv]||0)>(LVL_ORDER[byType[t].lv]||0))){
        byType[t]={lv,start:w.startTime,end:w.endTime};
      }
    });

    Object.entries(byType).forEach(([type,{lv,start,end}])=>{
      if(lv==='green') return; // skip green
      rows.push({label, type, lv, start, end});
    });
  });

  if(!rows.length){
    return `<div class="active-warnings">
      <div class="active-warnings-title">Avisos em vigor</div>
      <div class="no-active-warn">Sem avisos activos neste momento</div>
    </div>`;
  }

  const rowsHtml = rows.map(({label,type,lv,start,end})=>{
    const bg=BG[lv]||'#ccc';
    const icon=ICONS[type]||'';
    const textColor=(lv==='red'||lv==='orange')?'#fff':'#000';
    return `<div class="active-warn-row">
      <div class="active-warn-icon" style="background:${bg}">
        <svg width="11" height="11" viewBox="0 0 300 300" style="fill:${textColor}">${icon.replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>
      </div>
      <div>
        <div class="active-warn-region">${label} — ${type}</div>
        <div class="active-warn-text">${formatDT(start)} até ${formatDT(end)}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="active-warnings">
    <div class="active-warnings-title">Avisos em vigor</div>
    ${rowsHtml}
  </div>`;
}

/* ──────────────── Load & render ──────────────── */
async function load(){
  const content=document.getElementById('content');
  try{
    const res=await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();

    /* Map colouring */
    const lvMCN=maxLevelMap('MCN',false,data);
    const lvMRM=maxLevelMap('MRM',false,data);
    const lvMCS=maxLevelMap('MCS',false,data);
    const lvAMN=maxLevelMap('MCN',true,data);
    const lvAMS=maxLevelMap('MCS',true,data);

    /* Region data for warnings */
    const rd={MRM:[],MCS:[]};
    data.forEach(w=>{if(rd.hasOwnProperty(w.idAreaAviso))rd[w.idAreaAviso].push(w)});

    /* Render all sections */
    content.innerHTML=
      buildHeaderWidget()+
      Object.entries(REGIONS).map(([code,name])=>buildRegionWidget(code,name,rd[code])).join('')+
      '<div class="fonte">Fonte: IPMA</div>'+
      buildMapWidget()+
      buildActiveWarnings(data);

    /* Colour the map now that SVG is in DOM */
    paintMap('reg-AM-N', COLORS_M[lvAMN!=='none'?lvAMN:'green']);
    paintMap('reg-MCN',  COLORS_M[lvMCN]);
    paintMap('reg-MRM',  COLORS_M[lvMRM]);
    paintMap('reg-MCS',  COLORS_M[lvMCS]);
    paintMap('reg-AM-S', COLORS_M[lvAMS!=='none'?lvAMS:'green']);

    if(window.parent!==window)
      window.parent.postMessage({type:'resize',height:document.body.scrollHeight},'*');
  }catch(e){
    content.innerHTML=`<div style="font-size:10px;color:#900;padding:4px">Erro: ${e.message}</div>`;
  }
}

load();
setInterval(load,10*60*1000);
</script>
